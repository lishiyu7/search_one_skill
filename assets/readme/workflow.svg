<svg xmlns="http://www.w3.org/2000/svg"
     width="1020" height="410" viewBox="0 0 1020 410"
     role="img" aria-labelledby="wf-title wf-desc">
  <title id="wf-title">search_one_skill workflow — 4-step search and install</title>
  <desc id="wf-desc">Step 1: Input &amp; translate. Step 2: Dual-source search. Step 3: Select result. Step 4: Install skill.</desc>

  <defs>
    <linearGradient id="cellGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#88C0D0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#88C0D0" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="cellGradDone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#88C0D0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#88C0D0" stop-opacity="0.03"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0 0L8 3L0 6" fill="#88C0D0" fill-opacity="0.65"/>
    </marker>
  </defs>

  <rect width="1020" height="410" rx="24" fill="#0d1117"/>

  <!-- ═══════════ Between-cell arrows (clockwise: ①→②→③→④) ═══════════ -->
  <!-- ①→② horizontal, top gap -->
  <line x1="520" y1="115" x2="542" y2="115" stroke="#88C0D0" stroke-width="2" stroke-opacity="0.5" marker-end="url(#arr)"/>

  <!-- ②→③ vertical, right gap -->
  <line x1="755" y1="180" x2="755" y2="219" stroke="#88C0D0" stroke-width="2" stroke-opacity="0.5" marker-end="url(#arr)"/>

  <!-- ③→④ horizontal, bottom gap (right to left) -->
  <line x1="550" y1="290" x2="528" y2="290" stroke="#88C0D0" stroke-width="2" stroke-opacity="0.5" marker-end="url(#arr)"/>

  <!-- ═══════════ CELL ① — Top-Left: Input &amp; Translate ═══════════ -->
  <g transform="translate(60 50)">
    <rect x="0" y="0" width="460" height="130" rx="12" fill="url(#cellGrad)" stroke="#88C0D0" stroke-width="1" stroke-opacity="0.18"/>

    <!-- header bar -->
    <rect x="0" y="0" width="460" height="36" rx="12" fill="#88C0D0" fill-opacity="0.06"/>
    <rect x="0" y="24" width="460" height="12" fill="#88C0D0" fill-opacity="0.06"/>

    <!-- step badge ① (active) -->
    <circle cx="25" cy="18" r="11" fill="#88C0D0" fill-opacity="0.12" stroke="#88C0D0" stroke-width="1"/>
    <text x="25" y="22" text-anchor="middle" fill="#88C0D0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">①</text>

    <!-- title -->
    <text x="46" y="22" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="14" font-weight="600">Input &amp; Translate</text>

    <!-- flow -->
    <g transform="translate(20 56)">
      <rect x="0" y="0" width="185" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="16" y="21" fill="#c9d1d9" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12">User task description</text>

      <line x1="193" y1="16" x2="223" y2="16" stroke="#88C0D0" stroke-width="1.5" stroke-opacity="0.45" marker-end="url(#arr)"/>

      <rect x="231" y="0" width="190" height="32" rx="6" fill="#161b22" stroke="#88C0D0" stroke-width="1" stroke-opacity="0.25"/>
      <text x="247" y="21" fill="#88C0D0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12">CN → EN translate</text>
    </g>
  </g>

  <!-- ═══════════ CELL ② — Top-Right: Dual Search ═══════════ -->
  <g transform="translate(550 50)">
    <rect x="0" y="0" width="410" height="130" rx="12" fill="url(#cellGrad)" stroke="#88C0D0" stroke-width="1" stroke-opacity="0.18"/>

    <!-- header bar -->
    <rect x="0" y="0" width="410" height="36" rx="12" fill="#88C0D0" fill-opacity="0.06"/>
    <rect x="0" y="24" width="410" height="12" fill="#88C0D0" fill-opacity="0.06"/>

    <!-- step badge ② (active) -->
    <circle cx="25" cy="18" r="11" fill="#88C0D0" fill-opacity="0.12" stroke="#88C0D0" stroke-width="1"/>
    <text x="25" y="22" text-anchor="middle" fill="#88C0D0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">②</text>

    <!-- title -->
    <text x="46" y="22" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="14" font-weight="600">Dual Search</text>

    <!-- flow -->
    <g transform="translate(20 56)">
      <rect x="0" y="0" width="155" height="32" rx="6" fill="#161b22" stroke="#88C0D0" stroke-width="1" stroke-opacity="0.25"/>
      <text x="16" y="21" fill="#c9d1d9" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12">skill_search.py</text>

      <line x1="163" y1="16" x2="193" y2="16" stroke="#88C0D0" stroke-width="1.5" stroke-opacity="0.45" marker-end="url(#arr)"/>

      <rect x="201" y="0" width="187" height="32" rx="6" fill="#161b22" stroke="#f0f6fc" stroke-width="1.2" stroke-opacity="0.15"/>
      <text x="217" y="21" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12" font-weight="600">TOP 5 results · JSON</text>
    </g>

    <!-- source badges -->
    <g transform="translate(20 98)">
      <rect x="0" y="0" width="80" height="18" rx="4" fill="#88C0D0" fill-opacity="0.1"/>
      <text x="40" y="12" text-anchor="middle" fill="#88C0D0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">GitHub API</text>

      <rect x="86" y="0" width="80" height="18" rx="4" fill="#88C0D0" fill-opacity="0.1"/>
      <text x="126" y="12" text-anchor="middle" fill="#88C0D0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">SkillHub CLI</text>

      <text x="182" y="12" fill="#484f58" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="10">parallel · merged by score</text>
    </g>
  </g>

  <!-- ═══════════ CELL ③ — Bottom-Right: Select ═══════════ -->
  <g transform="translate(550 225)">
    <rect x="0" y="0" width="410" height="130" rx="12" fill="url(#cellGrad)" stroke="#88C0D0" stroke-width="1" stroke-opacity="0.18"/>

    <!-- header bar -->
    <rect x="0" y="0" width="410" height="36" rx="12" fill="#88C0D0" fill-opacity="0.06"/>
    <rect x="0" y="24" width="410" height="12" fill="#88C0D0" fill-opacity="0.06"/>

    <!-- step badge ③ (active) -->
    <circle cx="25" cy="18" r="11" fill="#88C0D0" fill-opacity="0.12" stroke="#88C0D0" stroke-width="1"/>
    <text x="25" y="22" text-anchor="middle" fill="#88C0D0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">③</text>

    <!-- title -->
    <text x="46" y="22" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="14" font-weight="600">Select</text>

    <!-- content -->
    <g transform="translate(20 56)">
      <rect x="0" y="0" width="370" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="16" y="21" fill="#c9d1d9" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12">User picks one skill from the ranked TOP 5 results</text>
    </g>
  </g>

  <!-- ═══════════ CELL ④ — Bottom-Left: Install (completed) ═══════════ -->
  <g transform="translate(60 225)">
    <rect x="0" y="0" width="460" height="130" rx="12" fill="url(#cellGradDone)" stroke="#88C0D0" stroke-width="1.2" stroke-opacity="0.28"/>

    <!-- header bar (deeper for completed) -->
    <rect x="0" y="0" width="460" height="36" rx="12" fill="#88C0D0" fill-opacity="0.10"/>
    <rect x="0" y="24" width="460" height="12" fill="#88C0D0" fill-opacity="0.10"/>

    <!-- step badge ④ (completed — deeper fill + checkmark) -->
    <circle cx="25" cy="18" r="11" fill="#88C0D0" fill-opacity="0.22" stroke="#88C0D0" stroke-width="1.4"/>
    <path d="M19 18 L23 22 L31 14" fill="none" stroke="#f0f6fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- title -->
    <text x="46" y="22" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="14" font-weight="600">Install</text>

    <!-- flow -->
    <g transform="translate(20 56)">
      <rect x="0" y="0" width="125" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="16" y="21" fill="#c9d1d9" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12">Source routing</text>

      <line x1="133" y1="16" x2="163" y2="16" stroke="#88C0D0" stroke-width="1.5" stroke-opacity="0.45" marker-end="url(#arr)"/>

      <rect x="171" y="0" width="145" height="32" rx="6" fill="#161b22" stroke="#88C0D0" stroke-width="1" stroke-opacity="0.25"/>
      <text x="187" y="21" fill="#c9d1d9" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12">skill_install.py</text>

      <line x1="324" y1="16" x2="354" y2="16" stroke="#88C0D0" stroke-width="1.5" stroke-opacity="0.45" marker-end="url(#arr)"/>

      <rect x="362" y="0" width="76" height="32" rx="6" fill="#161b22" stroke="#f0f6fc" stroke-width="1.2" stroke-opacity="0.15"/>
      <text x="378" y="21" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12" font-weight="600">✓ DONE</text>
    </g>

    <!-- install method badges -->
    <g transform="translate(171 98)">
      <rect x="0" y="0" width="68" height="18" rx="4" fill="#88C0D0" fill-opacity="0.1"/>
      <text x="34" y="12" text-anchor="middle" fill="#88C0D0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">git clone</text>

      <rect x="74" y="0" width="48" height="18" rx="4" fill="#88C0D0" fill-opacity="0.1"/>
      <text x="98" y="12" text-anchor="middle" fill="#88C0D0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">ZIP ↓</text>

      <rect x="128" y="0" width="64" height="18" rx="4" fill="#88C0D0" fill-opacity="0.1"/>
      <text x="160" y="12" text-anchor="middle" fill="#88C0D0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">skillhub</text>

      <text x="208" y="12" fill="#484f58" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="10">auto fallback · SKILL.md validation</text>
    </g>
  </g>
</svg>
