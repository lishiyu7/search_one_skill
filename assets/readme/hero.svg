<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="360" viewBox="0 0 1200 360"
     role="img" aria-labelledby="title desc">
  <title id="title">search_one_skill — AI Agent Skill search and install workflow</title>
  <desc id="desc">Dual-source search across GitHub and SkillHub with one-command install for AI Agent skills.</desc>

  <defs/>

  <!-- Background -->
  <rect width="1200" height="360" rx="24" fill="#0d1117"/>

  <!-- Subtle grid texture -->
  <g opacity="0.04">
    <line x1="0" y1="90" x2="1200" y2="90" stroke="#c9d1d9" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#c9d1d9" stroke-width="0.5"/>
    <line x1="0" y1="270" x2="1200" y2="270" stroke="#c9d1d9" stroke-width="0.5"/>
  </g>

  <!-- ═══════════ LEFT: Title Block (不变) ═══════════ -->
  <g id="title-block" transform="translate(56 48)">
    <!-- Category pill -->
    <rect x="0" y="0" width="130" height="28" rx="6" fill="#88C0D0" fill-opacity="0.12" stroke="#88C0D0" stroke-width="1" stroke-opacity="0.3"/>
    <text x="65" y="19" text-anchor="middle" fill="#88C0D0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="11" font-weight="600" letter-spacing="1.2">AI AGENT TOOL</text>

    <!-- Project name -->
    <text x="0" y="72" fill="#f0f6fc" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="44" font-weight="700">search_one_skill</text>

    <!-- One-line value -->
    <text x="0" y="112" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="17" font-weight="400">
      <tspan x="0" dy="0">Search and install skills that best fit your needs from</tspan>
      <tspan fill="#88C0D0" font-weight="500"> GitHub</tspan>
      <tspan> and</tspan>
      <tspan fill="#A3BE8C" font-weight="500"> SkillHub</tspan>
      <tspan> — directly inside your conversation</tspan>
    </text>

    <!-- Metadata row -->
    <g transform="translate(0 148)">
      <rect x="0" y="0" width="52" height="22" rx="4" fill="#30363d"/>
      <text x="26" y="15" text-anchor="middle" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="11" font-weight="500">Python</text>

      <rect x="60" y="0" width="38" height="22" rx="4" fill="#30363d"/>
      <text x="79" y="15" text-anchor="middle" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="11" font-weight="500">MIT</text>

      <text x="112" y="15" fill="#484f58" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="11">· 2 sources · 2 scripts · 0 deps</text>
    </g>

    <!-- Quick install command preview -->
    <g transform="translate(0 196)">
      <rect x="0" y="0" width="560" height="36" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="16" y="23" fill="#8b949e" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">
        <tspan fill="#8b949e">$</tspan>
        <tspan fill="#f0f6fc"> git clone https://github.com/lishiyu7/search_one_skill.git</tspan>
      </text>
    </g>
  </g>

  <!-- ═══════════ RIGHT: Z字型流程重构（左上→右上→右下→左下）═══════════ -->
  <g id="proof-block" transform="translate(660 40)">
    <!-- 1. Z起点：左上搜索输入框 -->
    <g transform="translate(0 20)">
    <rect x="0" y="0" width="220" height="42" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="16" y="26" fill="#88C0D0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">
      <tspan fill="#8b949e">🔍 search "</tspan>
      <tspan fill="#f0f6fc">Create CV</tspan>
      <tspan fill="#8b949e">"</tspan>
    </text>
    </g>

    <!-- 2. Z右上：GitHub API 卡片 -->
    <g transform="translate(240 0)">
      <rect x="0" y="0" width="240" height="76" rx="10" fill="#161b22" stroke="#88C0D0" stroke-width="1.2" stroke-opacity="0.35"/>
      <rect x="0" y="0" width="240" height="28" rx="10" fill="#88C0D0" fill-opacity="0.08"/>
      <rect x="0" y="18" width="240" height="10" fill="#88C0D0" fill-opacity="0.08"/>
      <text x="12" y="19" fill="#88C0D0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12" font-weight="600">GitHub API</text>
      <text x="12" y="46" fill="#c9d1d9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">topic:skill + keyword</text>
      <text x="12" y="66" fill="#484f58" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">sort by stars · log-scale score</text>
    </g>

    <!-- 连接线1：搜索框 → GitHub（向右） -->
    <path d="M220 41 L240 41" stroke="#8b949e" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>

    <!-- 3. Z右下：SkillHub CLI 卡片 -->
    <g transform="translate(240 130)">
      <rect x="0" y="0" width="240" height="76" rx="10" fill="#161b22" stroke="#A3BE8C" stroke-width="1.2" stroke-opacity="0.35"/>
      <rect x="0" y="0" width="240" height="28" rx="10" fill="#A3BE8C" fill-opacity="0.08"/>
      <rect x="0" y="18" width="240" height="10" fill="#A3BE8C" fill-opacity="0.08"/>
      <text x="12" y="19" fill="#A3BE8C" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12" font-weight="600">SkillHub CLI</text>
      <text x="12" y="46" fill="#c9d1d9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">skillhub search --json</text>
      <text x="12" y="66" fill="#484f58" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">optional · silent fallback on miss</text>
    </g>

    <!-- 连接线2：GitHub → SkillHub（斜下Z折线） -->
    <path d="M360 76 L360 130" stroke="#8b949e" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>

    <!-- 4. Z左下：Merge 合并卡片（终点） -->
    <g transform="translate(0 150)">
      <rect x="0" y="0" width="220" height="36" rx="8" fill="#1c2128" stroke="#8b949e" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 3"/>
      <text x="110" y="22" text-anchor="middle" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,sans-serif" font-size="12" font-weight="500">Merge · Sort · TOP 5</text>
    </g>

    <!-- 连接线3：SkillHub → Merge（向左闭合Z） -->
    <path d="M240 168 L220 168" stroke="#8b949e" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>
  </g>
</svg>